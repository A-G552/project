<!doctype html>
<html lang = "en">
    <head>
        <title>
            Product Details
        </title>
        <link rel="stylesheet" href = "../CSS/styling.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>

    <body>
        <header>
            <a href = "index.html">
                <img src = "../Images/logo.png" alt = "Company Logo" style = "width: 50px; height: auto">
            </a>
            <nav>
                <a href="basket.html">
                    Basket
                </a> 
                <a href="checkout.html">
                    Checkout
                </a> 
                <a href="contact.html">
                    Contact
                </a> 
                <a href="wishlist.html">
                    Wish List
                </a>  
            </nav> 
        </header>

        <section style = "background-color: rgb(109, 192, 154); padding: 20px 40px; text-align: center">
            <form>
                <input type = "text" id = "searchInput" placeholder = "Search for a product..." class = "searchbar">
            </form>
        </section>

        <div class = "product-grid">
            <div class = "product-card">
                <img src = "" id = "product-image">
                <div class = "product-info">
                    <h3 id = "product-name"></h3>
                    <strong id = "product-price"></strong>
                </div>
            </div>

            <div class = "product-button-card">
                <h4>
                    Product In Stock
                </h4>
                <a id = "basket-id" href = "" class = "button">
                    Add to Basket
                </a>
                <a id = "wishlist-id" href = "" class = "button">
                    Add to Wish List
                </a>
            </div>
        </div>
        
        <div class = "description-container"> 
            <div class = "description">
                <h3>
                    Product Description
                </h3>
                <p id = "product-description"></p>
                
                <h3>
                    Rating
                </h3>
                <div class = "rating">
                    <span class="stars">
                            ★ ★ ★ ☆ ☆
                    </span>
                    <span class="rating-value">
                        3.0
                    </span>
                    <span class="rating-count">
                        150 Ratings
                    </span>
                </div>
            </div> 
        </div>

        <script>
            const products = {
                1: {
                    name: "Wooden Toothbrush",
                    price: "R100.00",
                    image: "../Images/toothbrush.png",
                    description: "Resuable toothbrush that is made out of wood."
                },

                2: {
                    name: "Metal Waterbottle",
                    price: "R500.00",
                    image: "../Images/waterbottle.png",
                    description: "Metal waterbottle with a sleek wooden finish."
                },

                3: {
                    name: "Wooden Utensil Set",
                    price: "R105.00",
                    image: "../Images/utensils.png",
                    description: "Resuable and dishwasher friendly wooden utensils."
                },

                4: {
                    name: "Bamboo Chopsticks Set",
                    price: "R100.00",
                    image: "../Images/chopsticks.png",
                    description: "Resuable bamboo chopsticks."
                },

                5: {
                    name: "Soy Candle",
                    price: "R500.00",
                    image: "../Images/candle.png",
                    description: "Vanilla scented soy candle. Perfect as an air freshener."
                },

                6: {
                    name: "Reusable Produce Bags",
                    price: "R105.00",
                    image: "../Images/bags.png",
                    description: "Resuable produce bags that are perfect for grocery shopping."
                },

                7: {
                    name: "Barrel Couch",
                    price: "R1000.00",
                    image: "../Images/couch.png",
                    description: "Barrel that was repurposed to be a couch."
                },

                8: {
                    name: "Tote Bag",
                    price: "R250.00",
                    image: "../Images/totebag.png",
                    description: "Tote bag made from upcycled material."
                },

                9: {
                    name: "Desk Organizer",
                    price: "R175.00",
                    image: "../Images/organizer.png",
                    description: "Upcycled plastic that was repurposed to be a desk organizer."
                },
            };
            //get ID's
            const parameters = new URLSearchParams(window.location.search);
            const id = parameters.get("id");
            const product = products[id];

            document.getElementById("product-image").src = product.image;
            document.getElementById("product-name").textContent = product.name;
            document.getElementById("product-price").textContent = product.price;
            document.getElementById("product-description").textContent = product.description;
            /*
            creates a dynamic link to basket.html/wishlist.html. It does this by appending the id of the current product to the link allowing it to
            dynamically change the product within the basket/wishlist after clicking their respective buttons
            */
            document.getElementById("basket-id").href = `basket.html?id=${id}`;
            document.getElementById("wishlist-id").href = `wishlist.html?id=${id}`;
        </script>

        <script>
            const searchInput = document.getElementById("searchInput");

            searchInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") { //user presses Enter
                    e.preventDefault();   //prevent default form submit
                    //Gets text from search
                    const text = searchInput.value.toLowerCase();

                    //Converts text to a format that can be used in a URL
                    const query = encodeURIComponent(text);
                    //changes URL to include the query
                    window.location.href = `search-results.html?q=${query}`;
                }
            });
        </script>
    </body>
</html>
